  <title>AI Radar</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172126;
      --muted: #5e6b72;
      --line: #d9e0e3;
      --paper: #f7f8f5;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-2: #b45309;
      --accent-3: #334155;
      --good: #16803d;
      --warn: #b45309;
      --shadow: 0 18px 50px rgba(21, 31, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px;
      background: #172126;
      color: #f4f7f3;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.05;
    }

    .pulse {
      width: 42px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #f5d27a 0 22%, transparent 23%),
        conic-gradient(from 30deg, #7dd3fc, #99f6e4, #fde68a, #fca5a5, #7dd3fc);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.08);
      flex: 0 0 auto;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
      color: rgba(244, 247, 243, 0.72);
      font-size: 13px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      color: rgba(244, 247, 243, 0.66);
      font-size: 12px;
    }

    .nav-label {
      margin: 20px 0 10px;
      color: rgba(244, 247, 243, 0.6);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .category-list,
    .source-list {
      display: grid;
      gap: 7px;
    }

    .filter-button {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: transparent;
      color: #f4f7f3;
      cursor: pointer;
      text-align: left;
    }

    .filter-button[aria-pressed="true"] {
      border-color: rgba(153, 246, 228, 0.8);
      background: rgba(45, 212, 191, 0.12);
    }

    .filter-button small {
      color: rgba(244, 247, 243, 0.62);
    }

    main {
      min-width: 0;
      padding: 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px 0 40px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    .search span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    select,
    .action {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
    }

    select {
      padding: 0 36px 0 12px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      cursor: pointer;
    }

    .action:hover,
    .filter-button:hover {
      border-color: #94a3a8;
    }

    .overview {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 8px;
    }

    .panel h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .bars {
      display: grid;
      gap: 10px;
      padding: 10px 16px 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 150px) minmax(0, 1fr) 34px;
      gap: 10px;
      align-items: center;
      min-height: 26px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #e8ece8;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #4f46e5);
    }

    .trend {
      padding: 12px 16px 16px;
    }

    .sparkline {
      display: grid;
      grid-template-columns: repeat(14, minmax(8px, 1fr));
      align-items: end;
      gap: 5px;
      height: 148px;
      margin-top: 5px;
    }

    .sparkline div {
      min-height: 8px;
      border-radius: 5px 5px 0 0;
      background: linear-gradient(180deg, #f59e0b, #0f766e);
    }

    .feed {
      display: grid;
      gap: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 84px;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .item:hover {
      border-color: #9aa8ad;
    }

    .item h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.28;
    }

    .item p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid #d6dee0;
      border-radius: 999px;
      color: var(--accent-3);
      background: #f8faf9;
      font-size: 12px;
      line-height: 1.2;
    }

    .chip.source {
      color: #814b10;
      border-color: #ead6b7;
      background: #fff7ed;
    }

    .score {
      display: grid;
      place-items: center;
      align-self: start;
      width: 76px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, var(--panel) 0 58%, transparent 59%),
        conic-gradient(var(--accent) calc(var(--score) * 1%), #e5e9e7 0);
      color: var(--ink);
      font-weight: 800;
    }

    .empty {
      padding: 32px;
      border: 1px dashed #a9b5ba;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.58);
    }

    .error-box {
      display: none;
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid #f3c98b;
      border-radius: 8px;
      background: #fff7ed;
      color: #7c3d12;
      font-size: 13px;
    }

    .error-box.show {
      display: block;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: relative;
        height: auto;
      }

      .category-list,
      .source-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .overview,
      .topbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      main,
      aside {
        padding: 16px;
      }

      .category-list,
      .source-list {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 1fr;
      }

      .score {
        width: 64px;
      }
    }
  </style>
</head>

  <script>
    const fallbackData = {
      generatedAt: new Date().toISOString(),
      windowDays: 0,
      totalItems: 3,
      sourceCount: 3,
      categories: [
        { id: "foundation-models", name: "基礎模型" },
        { id: "agents", name: "智慧體與工作流" },
        { id: "ai-infra", name: "AI Infra 與算力" }
      ],
      items: [
        {
          id: "sample-1",
          title: "執行 fetch-ai-radar.mjs 後，這裡會替換成最新 AI 動態",
          url: "https://openai.com/news/",
          summary: "腳本會讀取 sources.json，抓取公開 RSS/Atom/頁面，自動分類、去重，並把資料嵌入目前頁面。",
          publishedAt: new Date().toISOString(),
          timestamp: Date.now(),
          source: { name: "Local Sample", region: "Local", trust: "sample" },
          categories: ["foundation-models"],
          score: 88
        },
        {
          id: "sample-2",
          title: "賽道分類由 sources.json 的關鍵字控制",
          url: "https://huggingface.co/blog/feed.xml",
          summary: "你可以新增公司、媒體、論文來源，或者擴充機器人、AI for Science、監管安全等細分賽道。",
          publishedAt: new Date(Date.now() - 86400000).toISOString(),
          timestamp: Date.now() - 86400000,
          source: { name: "Config", region: "Global", trust: "sample" },
          categories: ["agents", "ai-infra"],
          score: 76
        },
        {
          id: "sample-3",
          title: "本頁面是純靜態前端，可直接部署到任意靜態伺服器",
          url: "https://developer.mozilla.org/",
          summary: "如果瀏覽器禁止 file:// 讀取 JSON，腳本會把最新資料直接嵌入 index.html，因此打開頁面也能看。",
          publishedAt: new Date(Date.now() - 172800000).toISOString(),
          timestamp: Date.now() - 172800000,
          source: { name: "Dashboard", region: "Local", trust: "sample" },
          categories: ["applications"],
          score: 64
        }
      ],
      errors: []
    };

    const DATA_REFRESH_MS = 5 * 60 * 1000;

    const state = {
      data: readEmbeddedData(),
      category: "all",
      region: "all",
      query: "",
      sort: "latest"
    };

    if (!state.data.items.length) {
      state.data = fallbackData;
    }

    const traditionalCategoryNames = new Map([
      ["foundation-models", "基礎模型"],
      ["agents", "智慧體與工作流"],
      ["ai-infra", "AI Infra 與算力"],
      ["applications", "應用與生產力"],
      ["media-generation", "圖像影片音訊生成"],
      ["robotics", "機器人與具身智慧"],
      ["ai-science", "AI for Science"],
      ["policy-safety", "監管安全與治理"],
      ["open-source", "開源生態"],
      ["capital-market", "投融資與商業"]
    ]);
    const categoryMap = new Map();
    syncCategoryMap(state.data.categories);
    const elements = {
      generatedAt: document.querySelector("#generatedAt"),
      coverage: document.querySelector("#coverage"),
      statItems: document.querySelector("#statItems"),
      statSources: document.querySelector("#statSources"),
      categoryList: document.querySelector("#categoryList"),
      regionList: document.querySelector("#regionList"),
      categoryBars: document.querySelector("#categoryBars"),
      sparkline: document.querySelector("#sparkline"),
      trendTotal: document.querySelector("#trendTotal"),
      feed: document.querySelector("#feed"),
      searchInput: document.querySelector("#searchInput"),
      sortSelect: document.querySelector("#sortSelect"),
      resetButton: document.querySelector("#resetButton"),
      activeFilter: document.querySelector("#activeFilter"),
      errorBox: document.querySelector("#errorBox")
    };

    elements.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    elements.sortSelect.addEventListener("change", (event) => {
      state.sort = event.target.value;
      render();
    });

    elements.resetButton.addEventListener("click", () => {
      state.category = "all";
      state.region = "all";
      state.query = "";
      state.sort = "latest";
      elements.searchInput.value = "";
      elements.sortSelect.value = "latest";
      render();
    });

    render();
    startDataRefresh();

    function render() {
      const filtered = getFilteredItems();
      renderMeta(filtered);
      renderFilters();
      renderBars(filtered);
      renderSparkline(filtered);
      renderFeed(filtered);
      renderErrors();
    }

    function getFilteredItems() {
      const query = state.query;
      const items = state.data.items.filter((item) => {
        const categoryOk = state.category === "all" || item.categories.includes(state.category);
        const regionOk = state.region === "all" || item.source.region === state.region;
        const queryText = `${item.title} ${item.summary} ${item.source.name} ${item.categories.join(" ")}`.toLowerCase();
        const queryOk = !query || queryText.includes(query);
        return categoryOk && regionOk && queryOk;
      });

      return items.sort((a, b) => {
        if (state.sort === "score") return (b.score || 0) - (a.score || 0);
        if (state.sort === "source") return a.source.name.localeCompare(b.source.name);
        return (b.timestamp || Date.parse(b.publishedAt) || 0) - (a.timestamp || Date.parse(a.publishedAt) || 0);
      });
    }

    function renderMeta(filtered) {
      const generated = state.data.generatedAt ? new Date(state.data.generatedAt) : null;
      elements.generatedAt.textContent = generated ? `更新於 ${formatDate(generated, true)}` : "未抓取";
      elements.coverage.textContent = `${filtered.length} / ${state.data.items.length} 則動態`;
      elements.statItems.textContent = String(state.data.items.length);
      elements.statSources.textContent = String(new Set(state.data.items.map((item) => item.source.name)).size || state.data.sourceCount || 0);

      const categoryName = state.category === "all" ? "全部賽道" : categoryMap.get(state.category) || state.category;
      const regionName = state.region === "all" ? "全部區域" : state.region;
      elements.activeFilter.textContent = `${categoryName} · ${regionName}`;
    }

    function renderFilters() {
      const categoryCounts = countBy(state.data.items.flatMap((item) => item.categories));
      const categories = [{ id: "all", name: "全部", count: state.data.items.length }]
        .concat(state.data.categories.map((category) => ({
          id: category.id,
          name: categoryMap.get(category.id) || toTraditional(category.name),
          count: categoryCounts.get(category.id) || 0
        })).filter((category) => category.count > 0));

      elements.categoryList.innerHTML = categories.map((category) => filterButton({
        id: category.id,
        label: category.name,
        count: category.count,
        pressed: state.category === category.id,
        kind: "category"
      })).join("");

      const regions = [...countBy(state.data.items.map((item) => item.source.region || "Global")).entries()]
        .sort((a, b) => b[1] - a[1]);
      const regionButtons = [{ id: "all", label: "全部", count: state.data.items.length }]
        .concat(regions.map(([id, count]) => ({ id, label: id, count })));

      elements.regionList.innerHTML = regionButtons.map((region) => filterButton({
        id: region.id,
        label: region.label,
        count: region.count,
        pressed: state.region === region.id,
        kind: "region"
      })).join("");

      elements.categoryList.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.id;
          render();
        });
      });

      elements.regionList.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.region = button.dataset.id;
          render();
        });
      });
    }

    function renderBars(items) {
      const counts = countBy(items.flatMap((item) => item.categories));
      const top = [...counts.entries()]
        .map(([id, count]) => ({ id, name: categoryMap.get(id) || id, count }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 8);
      const max = Math.max(1, ...top.map((item) => item.count));

      elements.categoryBars.innerHTML = top.length ? top.map((item) => `
        <div class="bar-row">
          <span>${escapeHtml(item.name)}</span>
          <div class="bar-track"><div class="bar" style="width: ${Math.max(8, item.count / max * 100)}%"></div></div>
          <strong>${item.count}</strong>
        </div>
      `).join("") : `<div class="empty">暫無符合的賽道</div>`;
    }

    function renderSparkline(items) {
      const days = 14;
      const start = startOfDay(Date.now() - (days - 1) * 86400000);
      const buckets = Array.from({ length: days }, (_, index) => ({
        day: start + index * 86400000,
        count: 0
      }));

      for (const item of items) {
        const time = item.timestamp || Date.parse(item.publishedAt);
        if (!Number.isFinite(time) || time < start) continue;
        const index = Math.min(days - 1, Math.floor((startOfDay(time) - start) / 86400000));
        if (index >= 0) buckets[index].count += 1;
      }

      const max = Math.max(1, ...buckets.map((bucket) => bucket.count));
      elements.trendTotal.textContent = `${buckets.reduce((sum, bucket) => sum + bucket.count, 0)} 則`;
      elements.sparkline.innerHTML = buckets.map((bucket) => {
        const height = Math.max(8, Math.round(bucket.count / max * 132));
        const label = new Date(bucket.day).toLocaleDateString("zh-CN", { month: "short", day: "numeric" });
        return `<div style="height:${height}px" title="${label}: ${bucket.count}"></div>`;
      }).join("");
    }

    function renderFeed(items) {
      if (!items.length) {
        elements.feed.innerHTML = `<div class="empty">沒有符合結果</div>`;
        return;
      }

      elements.feed.innerHTML = items.map((item) => {
        const categories = item.categories
          .map((category) => `<span class="chip">${escapeHtml(categoryMap.get(category) || category)}</span>`)
          .join("");
        return `
          <article class="item">
            <div>
              <a href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer">
                <h3>${escapeHtml(toTraditional(item.title))}</h3>
              </a>
              <p>${escapeHtml(toTraditional(item.summary || "暫無摘要"))}</p>
              <div class="chips">
                <span class="chip source">${escapeHtml(toTraditional(item.source.name))}</span>
                <span class="chip">${escapeHtml(toTraditional(item.source.region || "Global"))}</span>
                <span class="chip">${formatDate(item.publishedAt ? new Date(item.publishedAt) : null)}</span>
                ${categories}
              </div>
            </div>
            <div class="score" style="--score:${Math.max(0, Math.min(100, item.score || 0))}">
              ${Math.round(item.score || 0)}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderErrors() {
      const errors = state.data.errors || [];
      if (!errors.length) {
        elements.errorBox.classList.remove("show");
        elements.errorBox.textContent = "";
        return;
      }

      elements.errorBox.classList.add("show");
      elements.errorBox.textContent = `${errors.length} 個來源抓取失敗，已略過。打開 ai-radar-data.json 可查看詳情。`;
    }

    function startDataRefresh() {
      if (/^https?:$/.test(window.location.protocol)) {
        setInterval(refreshData, DATA_REFRESH_MS);
        return;
      }

      if (window.location.protocol === "file:") {
        setInterval(() => window.location.reload(), DATA_REFRESH_MS);
      }
    }

    async function refreshData() {
      try {
        const response = await fetch(`ai-radar-data.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const nextData = await response.json();
        if (!nextData || !Array.isArray(nextData.items)) return;
        if (nextData.generatedAt === state.data.generatedAt) return;

        state.data = nextData;
        syncCategoryMap(nextData.categories || []);
        render();
      } catch (error) {
        console.warn("AI Radar data refresh failed:", error);
      }
    }

    function syncCategoryMap(categories = []) {
      categoryMap.clear();
      categories.forEach((category) => categoryMap.set(category.id, toTraditional(category.name)));
      traditionalCategoryNames.forEach((name, id) => categoryMap.set(id, name));
    }

    function filterButton({ id, label, count, pressed, kind }) {
      return `
        <button class="filter-button" type="button" data-kind="${kind}" data-id="${escapeAttr(id)}" aria-pressed="${pressed}">
          <span>${escapeHtml(label)}</span>
          <small>${count}</small>
        </button>
      `;
    }

    function readEmbeddedData() {
      const node = document.querySelector("#ai-radar-data");
      try {
        return JSON.parse(node.textContent);
      } catch {
        return fallbackData;
      }
    }

    function countBy(values) {
      const counts = new Map();
      values.forEach((value) => counts.set(value, (counts.get(value) || 0) + 1));
      return counts;
    }

    function startOfDay(time) {
      const date = new Date(time);
      date.setHours(0, 0, 0, 0);
      return date.getTime();
    }

    function formatDate(date, withTime = false) {
      if (!date || Number.isNaN(date.getTime())) return "未知時間";
      return date.toLocaleString("zh-TW", {
        month: "short",
        day: "numeric",
        ...(withTime ? { hour: "2-digit", minute: "2-digit" } : {})
      });
    }

    function toTraditional(value) {
      const phraseMap = [
        ["基础模型", "基礎模型"],

        "域": "域", "搜": "搜", "论": "論", "文": "文", "优": "優", "达": "達", "热": "熱",
        "节": "節", "奏": "奏", "基": "基", "础": "礎", "模": "模", "型": "型", "智": "智", "能": "能",
        "体": "體", "工": "工", "作": "作", "流": "流", "算": "算", "力": "力", "应": "應", "用": "用",
        "产": "產", "图": "圖", "像": "像", "视": "視", "频": "頻", "音": "音", "机": "機", "器": "器",
        "监": "監", "管": "管", "安": "安", "全": "全", "治": "治", "理": "理", "开": "開", "态": "態",
        "投": "投", "融": "融", "资": "資", "业": "業", "国": "國", "语": "語", "种": "種", "实": "實",
        "时": "時", "翻": "翻", "译": "譯", "超": "超", "级": "級", "进": "進", "从": "從", "问": "問",
        "双": "雙", "兴": "興", "货": "貨", "顶": "頂", "层": "層", "谕": "諭", "务": "務", "类": "類",
        "权": "權", "经": "經", "说": "說", "话": "話", "间": "間", "觉": "覺", "时": "時", "厨": "廚",
        "举": "舉", "办": "辦", "质": "質", "发": "發", "规": "規", "设": "設", "坛": "壇", "创": "創",
        "赛": "賽", "启": "啟", "导": "導", "显": "顯", "示": "示", "额": "額", "报": "報", "闻": "聞",
        "标": "標", "题": "題", "摘": "摘", "暂": "暫", "无": "無", "错": "錯", "过": "過", "详": "詳",
        "间": "間"
      };

      let text = String(value || "");
      for (const [from, to] of phraseMap) {
        text = text.split(from).join(to);
      }
      return text.replace(/[\u4e00-\u9fff]/g, (char) => charMap[char] || char);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
